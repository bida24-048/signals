<!DOCTYPE html>
<html>
<head>
  <title>Signal Simulator</title>
  <h6>Made by LGM</h6>

  <style>
    body {
      background: #0b0b0b;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    #lockscreen {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 6px 0;
    }

    input {
      padding: 8px;
      width: 130px;
      text-align: center;
    }

    button {
      padding: 10px 15px;
      margin: 10px;
      cursor: pointer;
    }

    #circle {
      width:150px;
      height:150px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:20px auto;
      font-size:22px;
      border:3px solid white;
      animation: pulse 1.5s infinite;
    }

    .low { color:#00bfff; box-shadow:0 0 15px #00bfff; }
    .med { color:#a020f0; box-shadow:0 0 20px #a020f0; }
    .high { color:#ff4da6; box-shadow:0 0 25px #ff4da6; }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>

<div id="lockscreen">
  <h2>🔐 Enter Passcode</h2>
  <input type="password" id="passcode">
  <button onclick="unlock()">Unlock</button>
  <div id="error"></div>
</div>

<h2>📊 Signal Row Editor</h2>
<h4 id="clock"></h4>

<div id="table"></div>

<button id="genBtn" onclick="generate()" disabled>Generate</button>
<button onclick="resetSession()">🔄 Refresh Session</button>

<div id="signalView" style="display:none;">
  <div id="circle">--</div>
  <button onclick="generate()">Next Signal</button>
</div>

<script>

const PASS = "colsnist";

let data = [];
let index = 0;

let predictions = [];
let predIndex = 0;

const MIN_SIGNALS = 20;

/* CLOCK */
setInterval(()=>{
  document.getElementById("clock").innerText =
    new Date().toLocaleString();
},1000);

/* SOUND */
function playSound(type){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let osc = ctx.createOscillator();

  if(type==="low") osc.frequency.value = 200;
  if(type==="med") osc.frequency.value = 400;
  if(type==="high") osc.frequency.value = 700;

  osc.connect(ctx.destination);
  osc.start();

  setTimeout(()=>osc.stop(),150);
}

/* LOCK */
function unlock(){
  let p = document.getElementById("passcode");
  if(p.value === PASS){
    document.getElementById("lockscreen").style.display = "none";
    createRow();
  } else {
    document.getElementById("error").innerText = "Wrong passcode";
    p.value = "";
  }
}

/* ROW */
function createRow(){
  let table = document.getElementById("table");

  let row = document.createElement("div");
  row.className = "row";

  row.innerHTML = `
    <input id="time_${index}" placeholder="HH:MM" maxlength="5">
    <input id="spike_${index}" placeholder="Spike">
  `;

  table.appendChild(row);

  let timeBox = document.getElementById(`time_${index}`);
  let spikeBox = document.getElementById(`spike_${index}`);

  /* AUTO FORMAT TIME */
  timeBox.addEventListener("input", ()=>{
    let v = timeBox.value.replace(/[^0-9]/g, "");

    if(v.length >= 3){
      v = v.slice(0,2) + ":" + v.slice(2,4);
    }

    timeBox.value = v;

    if(v.length === 5){
      spikeBox.focus();
    }
  });

  /* SAVE ON ENTER */
  spikeBox.addEventListener("keydown", e=>{
    if(e.key==="Enter") saveRow();
  });
}

/* SAVE */
function saveRow(){
  let t = document.getElementById(`time_${index}`).value;
  let s = parseFloat(document.getElementById(`spike_${index}`).value);

  if(!t || isNaN(s)){
    alert("Invalid input");
    return;
  }

  data[index] = {time:t, spike:s};
  index++;

  if(index<10){
    createRow();
  } else {
    document.getElementById("genBtn").disabled = false;
  }
}

/* SMART LOGIC */
function buildPredictions(){

  let values = data.map(d=>d.spike);

  let avg = values.reduce((a,b)=>a+b,0)/values.length;
  let trend = values[values.length-1] - values[0];
  let vol = values.reduce((a,b)=>a+Math.abs(b-avg),0)/values.length;

  predictions = [];
  let base = avg;

  for(let i=0;i<MIN_SIGNALS;i++){
    let drift = trend * 0.05;
    let noise = (Math.random()-0.5) * vol;

    base = base + drift + noise;

    if(base < 1) base = 1 + Math.random();
    if(base > 10) base = 8 + Math.random()*5;

    let val = base;
    let cls = val<2?"low":val<5?"med":"high";

    predictions.push({
      value: val.toFixed(2),
      class: cls
    });
  }

  predIndex = 0;
}

/* GENERATE */
function generate(){

  if(predictions.length===0){
    buildPredictions();

    document.getElementById("table").style.display="none";
    document.getElementById("genBtn").style.display="none";
    document.getElementById("signalView").style.display="block";
  }

  if(predIndex>=predictions.length){

    document.getElementById("circle").innerHTML="LIMIT";

    setTimeout(()=>{
      alert("Signals reached the limit");
      resetSession();
    },2000);

    return;
  }

  let p = predictions[predIndex];
  let circle = document.getElementById("circle");

  circle.className = p.class;
  circle.innerHTML = p.value+"x";

  playSound(p.class);

  predIndex++;
}

/* RESET */
function resetSession(){

  data=[];
  index=0;
  predictions=[];
  predIndex=0;

  document.getElementById("table").innerHTML="";
  document.getElementById("genBtn").disabled=true;

  document.getElementById("table").style.display="block";
  document.getElementById("genBtn").style.display="inline-block";
  document.getElementById("signalView").style.display="none";

  document.getElementById("circle").innerHTML="--";

  createRow();
}

</script>

</body>
</html>
