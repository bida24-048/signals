<!DOCTYPE html>
<html>
<head>
  <title>Signal Simulator</title>

  <style>
    body {
      background: #0b0b0b;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    #lockscreen {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .row {
      display: flex;
      justify-content: center;
      margin: 6px 0;
    }

    input {
      padding: 10px;
      width: 160px;
      text-align: center;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      margin: 10px;
      cursor: pointer;
    }

    #circle {
      width:150px;
      height:150px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:20px auto;
      font-size:22px;
      border:3px solid white;
      animation: pulse 1.5s infinite;
    }

    .low { color:#00bfff; box-shadow:0 0 15px #00bfff; }
    .med { color:#a020f0; box-shadow:0 0 20px #a020f0; }
    .high { color:#ff4da6; box-shadow:0 0 25px #ff4da6; }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>

<div id="lockscreen">
  <h2>🔐 Enter Passcode</h2>
  <input type="password" id="passcode">
  <button onclick="unlock()">Unlock</button>
  <div id="error"></div>
</div>

<h2>📊 Enter 20 Spikes</h2>

<div id="table"></div>

<button id="genBtn" onclick="generate()" disabled>Generate</button>
<button onclick="resetSession()">🔄 Reset</button>

<div id="signalView" style="display:none;">
  <div id="circle">--</div>
  <button onclick="generate()">Next Signal</button>
</div>

<script>

const PASS = "colsnist";

let data = [];
let index = 0;

let predictions = [];
let predIndex = 0;

const MIN_SIGNALS = 20;

/* SOUND */
function playSound(type){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let osc = ctx.createOscillator();

  if(type==="low") osc.frequency.value = 200;
  if(type==="med") osc.frequency.value = 400;
  if(type==="high") osc.frequency.value = 700;

  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(),150);
}

/* POWER SOUND */
function playPowerSound(type){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let osc = ctx.createOscillator();

  if(type==="on") osc.frequency.value = 600;
  if(type==="off") osc.frequency.value = 150;

  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(),200);
}

/* LOCK */
function unlock(){
  let p = document.getElementById("passcode");
  if(p.value === PASS){
    playPowerSound("on");
    document.getElementById("lockscreen").style.display = "none";
    createRow();
  } else {
    document.getElementById("error").innerText = "Wrong passcode";
    p.value = "";
  }
}

/* CREATE ROW */
function createRow(){
  let table = document.getElementById("table");

  let row = document.createElement("div");
  row.className = "row";

  row.innerHTML = `
    <input id="spike_${index}" placeholder="Enter Spike">
  `;

  table.appendChild(row);

  let spikeBox = document.getElementById(`spike_${index}`);
  spikeBox.focus();

  spikeBox.addEventListener("keydown", e=>{
    if(e.key === "Enter"){
      saveRow();

      setTimeout(()=>{
        let next = document.getElementById(`spike_${index}`);
        if(next) next.focus();
      }, 50);
    }
  });
}

/* SAVE */
function saveRow(){
  let s = parseFloat(document.getElementById(`spike_${index}`).value);

  if(isNaN(s)){
    alert("Invalid spike");
    return;
  }

  data[index] = s;
  index++;

  if(index < 20){
    createRow();
  } else {
    document.getElementById("genBtn").disabled = false;
  }
}

/* BUILD PREDICTIONS */
function buildPredictions(){

  let avg = data.reduce((a,b)=>a+b,0)/data.length;
  let trend = data[data.length-1] - data[0];
  let vol = data.reduce((a,b)=>a+Math.abs(b-avg),0)/data.length;

  predictions = [];
  let base = avg;

  for(let i=0;i<MIN_SIGNALS;i++){
    let drift = trend * 0.05;
    let noise = (Math.random()-0.5) * vol;

    base = base + drift + noise;

    if(base < 1) base = 1 + Math.random();

    let val = base;
    let cls;

    if(val < 2) cls = "low";
    else if(val < 10) cls = "med";
    else cls = "high";

    predictions.push({
      value: val.toFixed(2),
      class: cls
    });
  }

  predIndex = 0;
}

/* GENERATE */
function generate(){

  if(predictions.length === 0){
    buildPredictions();

    document.getElementById("table").style.display = "none";
    document.getElementById("genBtn").style.display = "none";
    document.getElementById("signalView").style.display = "block";
  }

  if(predIndex >= predictions.length){
    document.getElementById("circle").innerHTML = "LIMIT";

    setTimeout(()=>{
      alert("Signals completed");
      resetSession();
    }, 1500);

    return;
  }

  let p = predictions[predIndex];
  let circle = document.getElementById("circle");

  circle.className = p.class;
  circle.innerHTML = p.value + "x";

  playSound(p.class);

  predIndex++;
}

/* RESET */
function resetSession(){

  playPowerSound("off");

  data = [];
  index = 0;
  predictions = [];
  predIndex = 0;

  document.getElementById("table").innerHTML = "";
  document.getElementById("genBtn").disabled = true;

  document.getElementById("table").style.display = "block";
  document.getElementById("genBtn").style.display = "inline-block";
  document.getElementById("signalView").style.display = "none";

  document.getElementById("circle").innerHTML = "--";

  createRow();
}

</script>

</body>
</html>
