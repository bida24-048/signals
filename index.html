<!DOCTYPE html>
<html>
<head>
  <title>Signal Simulator</title>
  <h6>LGM</h6>

  <style>
    body {
      background: #0b0b0b;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    #lockscreen {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #error {
      color: red;
      margin-top: 10px;
    }

    .row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 6px 0;
    }

    input {
      padding: 8px;
      width: 130px;
      text-align: center;
      font-size: 14px;
    }

    button {
      padding: 10px 15px;
      margin: 10px;
      cursor: pointer;
    }

    .low { color: #00bfff; }
    .med { color: #a020f0; }
    .high { color: #ff4da6; }
  </style>
</head>

<body>

<!-- LOCK -->
<div id="lockscreen">
  <h2>🔐 Enter Passcode</h2>
  <input type="password" id="passcode">
  <button onclick="unlock()">Unlock</button>
  <div id="error"></div>
</div>

<h2>📊 Signal Row Editor</h2>

<h4 id="clock"></h4>

<div id="table"></div>

<button id="genBtn" onclick="generate()" disabled>Generate</button>

<button onclick="resetSession()">🔄 Refresh Session</button>

<div id="result"></div>

<script>

const PASS = "colsnist";

let data = [];
let index = 0;

let predictions = [];
let predIndex = 0;

let sessionStart = Date.now();

const MIN_SIGNALS = 20;

/* ---------------- CLOCK ---------------- */
function updateClock(){
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleString();
}
setInterval(updateClock, 1000);

/* ---------------- AUTO RESET (30 min while open) ---------------- */
setInterval(()=>{
  if(Date.now() - sessionStart > 30 * 60 * 1000){
    resetSession();
    alert("Session expired (30 minutes). Please enter new data.");
  }
}, 60000);

/* ---------------- LOCK ---------------- */
function unlock(){
  let p = document.getElementById("passcode");

  if(p.value === PASS){
    document.getElementById("lockscreen").style.display = "none";
    createRow();
    updateClock();
    sessionStart = Date.now();
  } else {
    document.getElementById("error").innerText = "Wrong passcode";
    p.value = "";
  }
}

/* ---------------- CREATE ROW ---------------- */
function createRow(){

  let table = document.getElementById("table");

  let row = document.createElement("div");
  row.className = "row";

  row.innerHTML = `
    <input id="time_${index}" placeholder="HH:MM">
    <input id="spike_${index}" placeholder="Spike">
  `;

  table.appendChild(row);

  let timeBox = document.getElementById(`time_${index}`);
  let spikeBox = document.getElementById(`spike_${index}`);

  timeBox.addEventListener("input", function(){
    let v = this.value.replace(/\D/g,"");
    if(v.length >= 3){
      this.value = v.slice(0,2) + ":" + v.slice(2,4);
    } else {
      this.value = v;
    }
  });

  timeBox.addEventListener("keydown", e=>{
    if(e.key === "Enter") spikeBox.focus();
  });

  spikeBox.addEventListener("keydown", e=>{
    if(e.key === "Enter") saveRow();
  });

  timeBox.focus();
}

/* ---------------- SAVE ---------------- */
function saveRow(){

  let t = document.getElementById(`time_${index}`).value;
  let s = parseFloat(document.getElementById(`spike_${index}`).value);

  if(!t || isNaN(s)){
    alert("Enter valid time and spike");
    return;
  }

  data[index] = { time: t, spike: s };
  index++;

  if(index < 10){
    createRow();
  } else {
    document.getElementById("genBtn").disabled = false;
  }
}

/* ---------------- RNG ---------------- */
function seededRandom(seed){
  let x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

function classify(v){
  if(v < 2) return "low";
  if(v < 5) return "med";
  return "high";
}

/* ---------------- BUILD SIGNALS ---------------- */
function buildPredictions(){

  let values = data.map(d => d.spike);

  let avg = values.reduce((a,b)=>a+b,0)/values.length;
  let lastAvg = values.slice(-3).reduce((a,b)=>a+b,0)/Math.min(3,values.length);

  let seed = avg * 100;

  predictions = [];

  let totalSignals = Math.floor(MIN_SIGNALS + Math.random()*10);

  for(let i=1;i<=totalSignals;i++){

    let r = seededRandom(seed + i);
    let val;

    if(lastAvg > avg && r < 0.35){
      val = 5 + r * 25;
    }
    else if(lastAvg < avg && r < 0.75){
      val = 1 + r * 2.5;
    }
    else{
      val = 2 + r * 6;
    }

    predictions.push({
      value: val.toFixed(2),
      class: classify(val)
    });
  }

  predIndex = 0;
}

/* ---------------- GENERATE ONE BY ONE ---------------- */
function generate(){

  if(predictions.length === 0){
    buildPredictions();
  }

  if(predIndex >= predictions.length){
    document.getElementById("result").innerHTML =
      "<h3>⚠️ All signals completed. Click Refresh Session.</h3>";
    return;
  }

  let p = predictions[predIndex];

  document.getElementById("result").innerHTML =
    `<h3>📡 Signal ${predIndex + 1}</h3>
     <p class="${p.class}">
       NEXT → <b>${p.value}x</b>
     </p>`;

  predIndex++;
}

/* ---------------- RESET ---------------- */
function resetSession(){

  data = [];
  index = 0;

  predictions = [];
  predIndex = 0;

  document.getElementById("table").innerHTML = "";
  document.getElementById("genBtn").disabled = true;
  document.getElementById("result").innerHTML = "";

  createRow();
}

</script>

</body>
</html>
